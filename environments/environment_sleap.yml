# Position pipeline environment — SLEAP (sleap-nn / PyTorch backend)
#
# SLEAP needs its OWN environment, separate from DeepLabCut: the modern
# sleap-nn stack targets NumPy 2.x / Python >=3.11, while DeepLabCut 3.x pins
# numpy<2. The two cannot coexist in one environment. Use this file for SLEAP
# and environments/environment_dlc.yml for DeepLabCut.
#
# MIGRATING FROM POSITION V1: create a FRESH environment from this file — do
# NOT reuse, clone, or `env update` onto a Position-V1 environment. A leftover
# TensorFlow install (V1's DeepLabCut backend) collides with V2's jax stack
# (via non_local_detector) on the GPU. Check an existing environment with
# `python src/spyglass/position/v2/env_check.py`.
#
# 1. Install the correct GPU driver for your machine.
#    See https://stackoverflow.com/a/30820690
# 2. Create the environment:
#      mamba env create -f environments/environment_sleap.yml
#    Update an existing install:
#      mamba env update -f environments/environment_sleap.yml
# 3. Activate:
#      conda activate spyglass-sleap
#
# Note: torch/torchvision are installed via pip by sleap-nn (do NOT add a
#       conda pytorch pin here — it conflicts with sleap-nn's torch wheels).
name: spyglass-sleap
channels:
  - conda-forge
  - franklab
  - edeno
dependencies:
  - bottleneck
  - ffmpeg
  - ipympl
  - jupyterlab>=3.*
  - matplotlib
  - non_local_detector
  - pip>=20.2.*
  - position_tools
  - pybind11
  - pydotplus>=2.0.*
  - pyfftw<=0.12.0
  - python>=3.11,<3.14
  - ripple_detection
  - seaborn
  - track_linearization>=2.3
  - pip:
      - ghostipy
      - mountainsort4
      - ..[sleap]
