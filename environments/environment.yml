# 1. Install a conda distribution.
#    https://mamba.readthedocs.io/en/latest/installation/mamba-installation.html
# 2. Run: `mamba env create -f environment.yml`
# 3. Activate: `conda activate spyglass`
#
# (lines intentionally left blank)
#
#
name: spyglass
channels:
  - conda-forge
  # - defaults # deprecated
  - franklab
  - edeno
  # - pytorch # dlc-only
  # - anaconda  # dlc-only, for cudatoolkit
dependencies:
  - bottleneck
  # - cudatoolkit=11.3 # dlc-only
  # - ffmpeg # dlc-only
  - ipympl
  - jupyterlab>=3.*
  # - libgcc # dlc-only
  - matplotlib
  - non_local_detector
  - numpy>=2,<3
  - pip
  - position_tools
  - pybind11  # req by mountainsort4 -> isosplit5
  - pydotplus
  - pyfftw<=0.12.0  # ghostipy req. install from conda-forge for Mac ARM
  - python>=3.10,<3.13
  - pytorch>=2  # numpy>=2-compatible (the v2 stack needs torch>=2); the old <1.12 cap forced numpy<2
  - ripple_detection
  - scipy>=1.13  # numpy>=2 (the v2 SI 0.104 stack) needs scipy>=1.13; the legacy SI 0.99 env is environments/environment_spikesorting_legacy.yml
  - seaborn
  # - torchaudio # dlc-only
  # - torchvision # dlc-only
  - track_linearization>=2.3
  - pip:
      - ghostipy # for common_filter
      - mountainsort4
      - ..
