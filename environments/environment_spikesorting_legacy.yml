# Isolated conda environment for the legacy (v0/v1) spike-sorting tests.
#
# The repo now pins ``spikeinterface==0.104.3`` for the v2 pipeline (see
# pyproject.toml), but the v0/v1 active populate / curation / recompute
# paths call SpikeInterface APIs that were removed in 0.101+ and are gated
# behind ``_require_legacy_si_environment`` (see
# src/spyglass/spikesorting/_legacy_runtime.py), which raises under SI >=
# 0.101. The main `run-tests` CI job installs the 0.104 pin and therefore
# ``--ignore``s tests/spikesorting/v0 and v1; this file is the conda
# equivalent of the dedicated `pytest-legacy` CI job that runs those
# suites under the legacy SpikeInterface 0.99 line instead.
#
# 1. Relax the SI-0.104 pins in pyproject so the package's deps resolve to
#    the SI-0.99 line the v0/v1 active runtime paths need. pyproject's main
#    dependencies hard-pin ``spikeinterface==0.104.3`` (+ ``probeinterface
#    >=0.3.2`` + numpy 2 transitively) for the v2 pipeline; installing that
#    stack and downgrading afterward leaves an inconsistent set (numpy 2 ->
#    np.issctype, probeinterface 0.3.x contact-check, recompute namespace
#    mismatch). Relaxing the pins FIRST lets the env build resolve a coherent
#    SI-0.99 stack in one pass, matching master's run-tests env. The
#    `pytest-legacy` CI job sed-edits its ephemeral checkout; locally:
#       sed -i \
#         -e 's/"spikeinterface==0.104.3"/"spikeinterface>=0.99.1,<0.100"/' \
#         -e 's/"probeinterface>=0.3.2"/"probeinterface>=0.2.19,<0.3"/' \
#         -e 's/^  "numpy",/  "numpy>=1.23,<2",/' pyproject.toml
# 2. Create (from the repo root; the pip section installs the package
#    editable from the repo root via the `..` path):
#      mamba env create -f environments/environment_spikesorting_legacy.yml
# 3. Activate: `conda activate spyglass_spikesorting_legacy`
# 4. Run the legacy suites (Docker MySQL for DataJoint, or --no-docker
#    null_server against an external MySQL as CI does):
#       pytest tests/spikesorting/v0 tests/spikesorting/v1 --no-docker --no-dlc
#    Restore pyproject afterward (`git checkout pyproject.toml`) -- the pin
#    relaxation is a build-time-only edit, never committed.
name: spyglass_spikesorting_legacy
channels:
  - conda-forge
  - franklab
  - edeno
dependencies:
  - python=3.10
  - pybind11  # req by mountainsort4 -> isosplit5
  - pytorch<1.12.0
  - pip
  - pip:
      # Editable install of the repo root (this file lives in
      # environments/, so the package root is one level up). The ``test``
      # extra brings the test deps. With the pyproject pins relaxed first
      # (header step 1), this resolves the SI-0.99 line + a compatible
      # numpy/probeinterface/neo/pynwb/hdmf set in a single pass; without
      # that edit it would install the v2 ``spikeinterface==0.104.3`` stack.
      - mountainsort4
      - --editable "..[test]"
