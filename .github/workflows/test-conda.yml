name: Tests
permissions:
  contents: read

on:
  push:
    branches:
      - '!test_branch'
      - '!documentation'
  schedule:  # once a day at midnight UTC
    - cron: '0 0 * * *'
  pull_request: # requires approval for first-time contributors
    types: [synchronize, opened, reopened, labeled, closed]
  workflow_dispatch: # Manually trigger with 'Run workflow' button
    inputs:
      test_mode:
        description: 'Test mode (fast or full)'
        required: false
        default: 'full'
        type: choice
        options:
          - fast
          - full

concurrency: # Replace Cancel Workflow Action
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    # Skip if PR is closed but not merged
    if: |-
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
     run:
       shell: bash -l {0}
    env:
      OS: ubuntu-latest
      PYTHON: '3.10'
    services:
      mysql:
        image: datajoint/mysql:8.0
        # args: mysql -h 127.0.0.1 -P 3308 -uroot -ptutorial -e "CMD;"
        env:
          MYSQL_DATABASE: localhost
          MYSQL_ROOT_PASSWORD: tutorial
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON }}
    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: spyglass
        environment-file: environments/environment.yml
        miniforge-version: latest
        use-mamba: true
    - name: Install apt dependencies
      run: |
        sudo apt-get update # First mysql options
        # non-dlc position deps
        sudo apt-get install \
          mysql-client libmysqlclient-dev libgirepository1.0-dev -y
        sudo apt-get install ffmpeg libsm6 libxext6 -y
    - name: Run pip install for test deps
      run: |
        pip install --quiet .[test]
    - name: Cache test data
      id: cache-test-data
      uses: actions/cache@v4
      with:
        path: |
          tests/_data/raw/
          tests/_data/video/
        key: |-
          test-data-${{ hashFiles('.github/workflows/test-conda.yml') }}-v1
        restore-keys: |
          test-data-
    - name: Download data
      if: steps.cache-test-data.outputs.cache-hit != 'true'
      env:
        BASEURL: https://ucsf.box.com/shared/static/
        NWB_URL: k3sgql6z475oia848q1rgms4zdh4rkjn.nwb
        VID1URL: ykep8ek4ogad20wz4p0vuyuqfo60cv3w.h264
        VID2URL: d2jjk0y565ru75xqojio3hymmehzr5he.h264
        NWBFILE: minirec20230622.nwb
        VID_ONE: 20230622_minirec_01_s1.1.h264
        VID_TWO: 20230622_minirec_02_s2.1.h264
        RAW_DIR: /home/runner/work/spyglass/spyglass/tests/_data/raw/
        VID_DIR: /home/runner/work/spyglass/spyglass/tests/_data/video/
      run: |
        mkdir -p $RAW_DIR $VID_DIR
        curl_opts() { # Declare func with download options
          curl -L --output "$1""$2" "$BASEURL""$3"
        }
        curl_opts $RAW_DIR $NWBFILE $NWB_URL
        curl_opts $VID_DIR $VID_ONE $VID1URL
        curl_opts $VID_DIR $VID_TWO $VID2URL
    - name: Move actions coveragerc
      run: mv tests/.coveragerc .coveragerc
    - name: Determine test mode
      id: test_mode
      run: |
        # Determine which tests to run based on trigger
        if [[ "${{ github.event_name }}" == "push" ]]; then
          # Fast tests on push
          echo "mode=fast" >> $GITHUB_OUTPUT
          echo "marker_args=-m 'not slow and not very_slow'" \
            >> $GITHUB_OUTPUT
          echo "description=Fast tests" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "pull_request" ]] \
          && [[ "${{ github.event.action }}" == "closed" ]] \
          && [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
          # Full suite on PR merge
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "marker_args=" >> $GITHUB_OUTPUT
          echo "description=Full test suite" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # Manual trigger - use input
          if [[ "${{ github.event.inputs.test_mode }}" == "fast" ]]; then
            echo "mode=fast" >> $GITHUB_OUTPUT
            echo "marker_args=-m 'not slow and not very_slow'" \
              >> $GITHUB_OUTPUT
            echo "description=Fast tests (manual)" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "marker_args=" >> $GITHUB_OUTPUT
            echo "description=Full suite (manual)" >> $GITHUB_OUTPUT
          fi
        else
          # Full suite for schedule and other PR events
          # (synchronize, opened, etc.)
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "marker_args=" >> $GITHUB_OUTPUT
          echo "description=Full test suite" >> $GITHUB_OUTPUT
        fi
    - name: Run tests (${{ steps.test_mode.outputs.description }})
      run: |
        # --base-dir pins tests to the cached tests/_data/ path (see
        # Cache test data step above). Without it, conftest.py now defaults
        # to a per-session temp directory for safety (issue #1573), which
        # would bypass the cache and re-download the NWB + video fixtures.
        # tests/spikesorting/v*/ are excluded here. This job installs the
        # project pin (SpikeInterface 0.104), which supports only the v2
        # runtime; the v0/v1 active tests exercise guarded legacy
        # SpikeInterface 0.99 paths and run in the separate pytest-legacy
        # job, while v2 runs in the separate pytest-v2 job.
        pytest --no-docker --no-dlc --base-dir ./tests/_data/ \
          --cov-config=.coveragerc --cov=spyglass-neuro --cov-report=xml \
          ${{ steps.test_mode.outputs.marker_args }} \
          --ignore=tests/spikesorting/v0 \
          --ignore=tests/spikesorting/v1 \
          --ignore=tests/spikesorting/v2 \
          tests/
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: ${{ steps.test_mode.outputs.mode }}-tests
        name: ${{ steps.test_mode.outputs.description }}

  pytest-v2:
    # Modern spike-sorting tests run under SpikeInterface 0.104, isolated
    # from the SpikeInterface 0.99 suite in run-tests above. Static-tier
    # tests run DB-free; DB-tier tests (fixture ingestion, legacy-runtime
    # boundary) connect to the MySQL service via the conftest's
    # null_server path.
    name: pytest-v2 (SpikeInterface 0.104)
    # Skip if PR is closed but not merged
    if: |-
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    services:
      mysql:
        image: datajoint/mysql:8.0
        env:
          MYSQL_DATABASE: localhost
          MYSQL_ROOT_PASSWORD: tutorial
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmysqlclient-dev
    - name: Set up conda (SpikeInterface 0.104 environment)
      # The v2 environment is conda-managed for consistency with the
      # main suite (run-tests above), via the dedicated env file. The
      # env pins Python 3.11 + SpikeInterface 0.104 and installs the
      # test, spikesorting-v2, and spikesorting-v2-validation extras
      # (the validation extra brings MEArec / neuroconv so the smoke
      # fixture can be generated below). It deliberately does NOT
      # install ``spikesorting-v2-matching``: UnitMatchPy 3.3
      # transitively pulls torch + numpy<2, which DOWNGRADES the v2
      # numpy>=2 baseline. ``test_optional_matching_extra_resolution``
      # asserts numpy major >= 2; the matching extra is exercised in a
      # separate sacrificial env in the step below.
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: spyglass_spikesorting_v2
        environment-file: environments/environment_spikesorting_v2.yml
        miniforge-version: latest
        use-mamba: true
    - name: Generate MEArec smoke fixture
      # The smoke MEArec NWB (mearec_polymer_smoke.nwb, ~4s, small
      # template set) is required by the v2 integration tests in
      # test_integrity.py, test_downstream_consumers.py, and the
      # core test_single_session_pipeline.py paths. Without this
      # step those tests skip via the ``_FIXTURE_PATH.exists()``
      # guard and CI passes vacuously even when the pipeline has
      # regressed. The fixture is regenerated from a fixed seed
      # so the output is deterministic; SHAs in
      # ``fixtures/fixtures_manifest.json`` pin the contract.
      #
      # The 60s polymer / 60s Neuropixels / 120s drift fixtures
      # are NOT generated here (too slow for default CI); their
      # tests skip cleanly when absent and are intended for the
      # manual / scheduled full runs.
      run: |
        python tests/spikesorting/v2/fixtures/generate_mearec.py --smoke
    - name: Run modern spike-sorting tests
      run: |
        pytest tests/spikesorting/v2/ --no-docker --no-dlc -q
    # --- Phase 0c plan-line 125 matching-extra resolver-evidence job.
    # Runs in a SEPARATE, sacrificial conda env so the numpy<2
    # downgrade UnitMatchPy 3.3 forces does not poison the default v2
    # env. The test logic is a single resolver assertion (numpy major
    # >= 2) plus import gates -- when numpy<2 is forced, the assertion
    # fires and the resolver-evidence ticket re-opens.
    - name: Phase 0c matching-extra resolver evidence (separate env)
      env:
        # Promotes the test's "extras not importable" branch from
        # ``pytest.skip`` to ``pytest.fail``. The install step below
        # tolerates failure (transient build / network issues) but
        # MUST be followed by importable deps; a silent install
        # failure would otherwise leave the test skipping while CI
        # stays green.
        SPIKESORTING_V2_MATCHING_EXTRA_REQUIRED: "1"
      run: |
        # Sacrificial conda env: the matching extra downgrades numpy
        # below the v2 baseline, so it must never share the env above.
        conda create -y -n spyglass_v2_matching python=3.11
        # Install tolerates failure: upstream resolver breakages are
        # often transient (network, build-wheel) and NOT what this
        # gate measures. The resolver-evidence signal comes from the
        # pytest run below. With SPIKESORTING_V2_MATCHING_EXTRA_REQUIRED=1
        # the test fails (not skips) when the post-install deps are
        # absent, so a permanent extra-declaration bug cannot pose as
        # a transient install hiccup. The pytest run itself must NOT
        # be masked by ``|| true``.
        conda run -n spyglass_v2_matching pip install \
          -e ".[test,spikesorting-v2,spikesorting-v2-matching]" || true
        conda run -n spyglass_v2_matching pytest \
          tests/spikesorting/v2/test_v1_parity.py::test_optional_matching_extra_resolution \
          --no-docker --no-dlc -q

  pytest-legacy:
    # Legacy (v0/v1) spike-sorting tests run under SpikeInterface 0.99,
    # isolated from the 0.104 pin the rest of the suite uses. The v0/v1
    # active populate / curation / recompute paths are gated behind
    # ``_require_legacy_si_environment`` (raises under SI >= 0.101), so
    # they CANNOT run in the `run-tests` job (which installs the 0.104
    # pin and ``--ignore``s tests/spikesorting/v0 and v1). This job runs
    # them against the legacy SpikeInterface line instead, so the v0/v1
    # runtime keeps CI coverage while it is deprecated in favor of v2.
    name: pytest-legacy (SpikeInterface 0.99)
    # Skip if PR is closed but not merged
    if: |-
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    services:
      mysql:
        image: datajoint/mysql:8.0
        env:
          MYSQL_DATABASE: localhost
          MYSQL_ROOT_PASSWORD: tutorial
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        # mysql client for DataJoint; ffmpeg/libsm6/libxext6 for the
        # video fixtures the minirec ingestion (mini_insert) pulls in.
        sudo apt-get install -y \
          mysql-client libmysqlclient-dev ffmpeg libsm6 libxext6
    - name: Set up conda (legacy SpikeInterface 0.99 environment)
      # The legacy env is conda-managed via the dedicated env file, which
      # installs the repo's ``test`` extra and then force-downgrades
      # SpikeInterface to the 0.99 line the v0/v1 active runtime requires.
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: spyglass_spikesorting_legacy
        environment-file: environments/environment_spikesorting_legacy.yml
        miniforge-version: latest
        use-mamba: true
    - name: Cache test data
      id: cache-test-data
      uses: actions/cache@v4
      with:
        # Shares the cache key with the run-tests job so the minirec NWB
        # + video fixtures are downloaded at most once across both jobs.
        path: |
          tests/_data/raw/
          tests/_data/video/
        key: |-
          test-data-${{ hashFiles('.github/workflows/test-conda.yml') }}-v1
        restore-keys: |
          test-data-
    - name: Download data
      if: steps.cache-test-data.outputs.cache-hit != 'true'
      env:
        BASEURL: https://ucsf.box.com/shared/static/
        NWB_URL: k3sgql6z475oia848q1rgms4zdh4rkjn.nwb
        VID1URL: ykep8ek4ogad20wz4p0vuyuqfo60cv3w.h264
        VID2URL: d2jjk0y565ru75xqojio3hymmehzr5he.h264
        NWBFILE: minirec20230622.nwb
        VID_ONE: 20230622_minirec_01_s1.1.h264
        VID_TWO: 20230622_minirec_02_s2.1.h264
        RAW_DIR: /home/runner/work/spyglass/spyglass/tests/_data/raw/
        VID_DIR: /home/runner/work/spyglass/spyglass/tests/_data/video/
      run: |
        mkdir -p $RAW_DIR $VID_DIR
        curl_opts() { # Declare func with download options
          curl -L --output "$1""$2" "$BASEURL""$3"
        }
        curl_opts $RAW_DIR $NWBFILE $NWB_URL
        curl_opts $VID_DIR $VID_ONE $VID1URL
        curl_opts $VID_DIR $VID_TWO $VID2URL
    - name: Move actions coveragerc
      run: mv tests/.coveragerc .coveragerc
    - name: Run legacy spike-sorting tests
      run: |
        # --base-dir pins tests to the cached tests/_data/ path (see the
        # run-tests job for the rationale). --no-docker uses the conftest
        # null_server path against the MySQL service above.
        pytest tests/spikesorting/v0 tests/spikesorting/v1 \
          --no-docker --no-dlc --base-dir ./tests/_data/ -q
