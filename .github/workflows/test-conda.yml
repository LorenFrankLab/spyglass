name: Tests
permissions:
  contents: read

on:
  push:
    branches:
      - '!test_branch'
      - '!documentation'
  schedule:  # once a day at midnight UTC
    - cron: '0 0 * * *'
  pull_request: # requires approval for first-time contributors
    types: [synchronize, opened, reopened, labeled, closed]
  workflow_dispatch: # Manually trigger with 'Run workflow' button
    inputs:
      test_mode:
        description: 'Test mode (fast or full)'
        required: false
        default: 'full'
        type: choice
        options:
          - fast
          - full

concurrency: # Replace Cancel Workflow Action
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    # Skip if PR is closed but not merged
    if: |-
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
     run:
       shell: bash -l {0}
    env:
      OS: ubuntu-latest
      PYTHON: '3.10'
    services:
      mysql:
        image: datajoint/mysql:8.0
        # args: mysql -h 127.0.0.1 -P 3308 -uroot -ptutorial -e "CMD;"
        env:
          MYSQL_DATABASE: localhost
          MYSQL_ROOT_PASSWORD: tutorial
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON }}
    - name: Set up conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: spyglass
        environment-file: environments/environment.yml
        miniforge-version: latest
        use-mamba: true
    - name: Install apt dependencies
      run: |
        sudo apt-get update # First mysql options
        # non-dlc position deps
        sudo apt-get install \
          mysql-client libmysqlclient-dev libgirepository1.0-dev -y
        sudo apt-get install ffmpeg libsm6 libxext6 -y
    - name: Run pip install for test deps
      run: |
        pip install --quiet .[test]
    - name: Cache test data
      id: cache-test-data
      uses: actions/cache@v4
      with:
        path: |
          tests/_data/raw/
          tests/_data/video/
        key: |-
          test-data-${{ hashFiles('.github/workflows/test-conda.yml') }}-v1
        restore-keys: |
          test-data-
    - name: Download data
      if: steps.cache-test-data.outputs.cache-hit != 'true'
      env:
        BASEURL: https://ucsf.box.com/shared/static/
        NWB_URL: k3sgql6z475oia848q1rgms4zdh4rkjn.nwb
        VID1URL: ykep8ek4ogad20wz4p0vuyuqfo60cv3w.h264
        VID2URL: d2jjk0y565ru75xqojio3hymmehzr5he.h264
        NWBFILE: minirec20230622.nwb
        VID_ONE: 20230622_minirec_01_s1.1.h264
        VID_TWO: 20230622_minirec_02_s2.1.h264
        RAW_DIR: /home/runner/work/spyglass/spyglass/tests/_data/raw/
        VID_DIR: /home/runner/work/spyglass/spyglass/tests/_data/video/
      run: |
        mkdir -p $RAW_DIR $VID_DIR
        curl_opts() { # Declare func with download options
          curl -L --output "$1""$2" "$BASEURL""$3"
        }
        curl_opts $RAW_DIR $NWBFILE $NWB_URL
        curl_opts $VID_DIR $VID_ONE $VID1URL
        curl_opts $VID_DIR $VID_TWO $VID2URL
    - name: Move actions coveragerc
      run: mv tests/.coveragerc .coveragerc
    - name: Determine test mode
      id: test_mode
      run: |
        # Determine which tests to run based on trigger
        if [[ "${{ github.event_name }}" == "push" ]]; then
          # Fast tests on push
          echo "mode=fast" >> $GITHUB_OUTPUT
          echo "marker_args=-m 'not slow and not very_slow'" \
            >> $GITHUB_OUTPUT
          echo "description=Fast tests" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "pull_request" ]] \
          && [[ "${{ github.event.action }}" == "closed" ]] \
          && [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
          # Full suite on PR merge
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "marker_args=" >> $GITHUB_OUTPUT
          echo "description=Full test suite" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # Manual trigger - use input
          if [[ "${{ github.event.inputs.test_mode }}" == "fast" ]]; then
            echo "mode=fast" >> $GITHUB_OUTPUT
            echo "marker_args=-m 'not slow and not very_slow'" \
              >> $GITHUB_OUTPUT
            echo "description=Fast tests (manual)" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "marker_args=" >> $GITHUB_OUTPUT
            echo "description=Full suite (manual)" >> $GITHUB_OUTPUT
          fi
        else
          # Full suite for schedule and other PR events
          # (synchronize, opened, etc.)
          echo "mode=full" >> $GITHUB_OUTPUT
          echo "marker_args=" >> $GITHUB_OUTPUT
          echo "description=Full test suite" >> $GITHUB_OUTPUT
        fi
    - name: Run tests (${{ steps.test_mode.outputs.description }})
      run: |
        # --base-dir pins tests to the cached tests/_data/ path (see
        # Cache test data step above). Without it, conftest.py now defaults
        # to a per-session temp directory for safety (issue #1573), which
        # would bypass the cache and re-download the NWB + video fixtures.
        # tests/spikesorting/v*/ are excluded here. This job installs the
        # project pin (SpikeInterface 0.104), which supports only the v2
        # runtime; the v0/v1 active tests exercise guarded legacy
        # SpikeInterface 0.99 paths and run in the separate pytest-legacy
        # job, while v2 runs in the separate pytest-v2 job.
        pytest --no-docker --no-dlc --base-dir ./tests/_data/ \
          --cov-config=.coveragerc --cov=spyglass-neuro --cov-report=xml \
          ${{ steps.test_mode.outputs.marker_args }} \
          --ignore=tests/spikesorting/v0 \
          --ignore=tests/spikesorting/v1 \
          --ignore=tests/spikesorting/v2 \
          tests/
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: ${{ steps.test_mode.outputs.mode }}-tests
        name: ${{ steps.test_mode.outputs.description }}

  pytest-v2:
    # Modern spike-sorting tests run under SpikeInterface 0.104, isolated
    # from the SpikeInterface 0.99 suite in run-tests above. Static-tier
    # tests run DB-free; DB-tier tests (fixture ingestion, legacy-runtime
    # boundary) connect to the MySQL service via the conftest's
    # null_server path.
    name: pytest-v2 (SpikeInterface 0.104)
    # Skip if PR is closed but not merged
    if: |-
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    services:
      mysql:
        image: datajoint/mysql:8.0
        env:
          MYSQL_DATABASE: localhost
          MYSQL_ROOT_PASSWORD: tutorial
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmysqlclient-dev
    - name: Set up conda (SpikeInterface 0.104 environment)
      # The v2 environment is conda-managed for consistency with the
      # main suite (run-tests above), via the dedicated env file. The
      # env pins Python 3.11 + SpikeInterface 0.104 and installs the
      # test, spikesorting-v2, and spikesorting-v2-validation extras
      # (the validation extra brings MEArec / neuroconv, which the tests use
      # to read ground-truth units). NEURON + LFPy are deliberately NOT
      # installed: they are needed only to *generate* fixtures, and this job
      # downloads the canonical fixtures via _fetch.py instead. The
      # ``spikesorting-v2`` extra now brings torch (the DriftEstimate
      # drift-QC table's dredge preset needs it; torch 2.x keeps numpy>=2).
      # It does NOT install
      # ``spikesorting-v2-matching``: that is kept separate for dependency
      # weight (and the resolver-evidence contract), not because the pinned
      # extra breaks numpy. The extra is pinned to UnitMatchPy 3.2.7 --
      # the last release declaring numpy>=2 -- so it does NOT force the
      # numpy<2 downgrade 3.2.8+/3.3.x's reactive pin would cause (upstream
      # #134; see pyproject). ``test_optional_matching_extra_resolution``
      # asserts numpy major >= 2; the matching extra is exercised in a
      # separate env in the step below.
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: spyglass_spikesorting_v2
        environment-file: environments/environment_spikesorting_v2.yml
        miniforge-version: latest
        use-mamba: true
    - name: Cache downloaded MEArec fixtures
      # Avoid re-downloading the canonical fixtures from Box every run. Keyed
      # on the manifest (fixture bytes) + _fetch.py (Box URLs) so a fixture
      # refresh or URL change busts the cache, and on github.event_name so the
      # per-PR cache (smoke only) and the nightly cache (smoke + 60s) keep
      # separate entries rather than clobbering one key. On a hit, _fetch.py
      # finds the files already present and is a no-op.
      uses: actions/cache@v4
      with:
        path: tests/spikesorting/v2/fixtures/*.nwb
        key: v2-fixtures-${{ github.event_name }}-${{ hashFiles('tests/spikesorting/v2/fixtures/fixtures_manifest.json', 'tests/spikesorting/v2/fixtures/_fetch.py') }}
    - name: Download smoke fixture (canonical artifact from Box)
      # Per-PR fixture. _fetch.py downloads it from Box (URL pinned in
      # _fetch.py) and sha256-verifies against the committed manifest, retrying
      # transient network errors. A hash MISMATCH, or a missing/4xx URL, fails
      # the job loudly -- there is deliberately NO ``|| generate_mearec``
      # fallback: a silent regenerate would (a) hide a corrupt or rotated
      # artifact behind a green build, and (b) drag the NEURON/LFPy biophysical
      # toolchain back into the per-PR job. Regeneration is a manual operation
      # (generate_mearec.py; see fixtures/README.md), not a CI fallback.
      #
      # mearec_polymer_smoke.nwb (~4s) drives the per-PR integration /
      # clusterless / zero-unit cases. The 60s / Neuropixels / drift fixtures
      # are downloaded only on the nightly/manual runs (next step); their tests
      # skip cleanly via ``*_PATH.exists()`` guards otherwise. No-op on a cache
      # hit.
      run: |
        python tests/spikesorting/v2/fixtures/_fetch.py mearec_polymer_smoke
    - name: Download 60s polymer fixture (scheduled / manual full runs)
      # Pulled into the suite only on the nightly cron / manual dispatch -- it
      # un-skips the merge frame-equality check, the MS5 ground-truth accuracy
      # gate (single_session/test_ground_truth_parity.py), and the clusterless sparse-id
      # case. Per-PR runs skip those via their ``*_PATH.exists()`` guards;
      # their behaviour is also covered per-PR on the smoke fixture (e.g.
      # test_lazy_vs_applied_merge_frames_equal), so nothing is silently
      # uncovered. Same download + verify + no-fallback contract as the smoke
      # step above.
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      run: |
        python tests/spikesorting/v2/fixtures/_fetch.py mearec_polymer_128ch_60s
    - name: Download scenario fixtures (manual dispatch only)
      # Dense-probe (neuropixels) and tetrode-path coverage. These change
      # rarely, so they are pulled only on a manual workflow_dispatch (or run
      # locally) rather than per-PR or nightly. The drift fixture is hosted on
      # Box but intentionally NOT fetched -- no test references it yet (motion
      # correction is unwritten). Same download + verify + no-fallback contract.
      if: github.event_name == 'workflow_dispatch'
      run: |
        python tests/spikesorting/v2/fixtures/_fetch.py mearec_neuropixels_60s
        python tests/spikesorting/v2/fixtures/_fetch.py mearec_tetrode_60s
    - name: Select required fixtures for this run
      # Names the fixtures that MUST drive their gates on this tier (matching
      # the download steps above). conftest's pytest_sessionstart fails the
      # session if any are absent, so a green run honestly means the gates ran
      # rather than silently skipping on a missing fixture.
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          REQ="mearec_polymer_smoke mearec_polymer_128ch_60s mearec_neuropixels_60s mearec_tetrode_60s"
        elif [ "${{ github.event_name }}" = "schedule" ]; then
          REQ="mearec_polymer_smoke mearec_polymer_128ch_60s"
        else
          REQ="mearec_polymer_smoke"
        fi
        echo "SPYGLASS_V2_REQUIRE_FIXTURES=$REQ" >> "$GITHUB_ENV"
    - name: Run modern spike-sorting tests
      # Collects the whole v2 dir. The smoke fixture drives the per-PR
      # integration + clusterless + zero-unit cases; when the 60s polymer
      # fixture is present (scheduled / manual runs) the merge, MS5
      # ground-truth, and clusterless sparse-id cases run too -- otherwise
      # they skip cleanly via their ``*_PATH.exists()`` / fixture guards.
      # NOTE: this job does NOT honor the workflow_dispatch fast/full
      # ``test_mode`` input (that governs the general ``run-tests`` job only).
      # The v2 coverage tier is keyed on the EVENT (push=smoke, schedule=+60s,
      # manual dispatch=+scenario fixtures + REQUIRE), so a manual dispatch is
      # always the most thorough v2 run; there is no fast v2 lane by design.
      run: |
        pytest tests/spikesorting/v2/ --no-docker --no-dlc -q
    # --- Matching-extra resolver-evidence job.
    # Runs in a SEPARATE conda env (the matching extra pulls torch +
    # CUDA; kept out of the default v2 env for weight, not numpy). The
    # test logic is a single resolver assertion (numpy major >= 2) plus
    # import gates -- if a future UnitMatchPy re-forces numpy<2 (as
    # 3.2.8+ did), the assertion fires and the resolver ticket re-opens.
    - name: Matching-extra resolver evidence (separate env)
      env:
        # Promotes the test's "extras not importable" branch from
        # ``pytest.skip`` to ``pytest.fail``. The install step below
        # tolerates failure (transient build / network issues) but
        # MUST be followed by importable deps; a silent install
        # failure would otherwise leave the test skipping while CI
        # stays green.
        SPIKESORTING_V2_MATCHING_EXTRA_REQUIRED: "1"
      run: |
        # Separate conda env, kept off the default v2 env above for
        # dependency weight (the matching extra pulls torch + CUDA),
        # NOT for a numpy downgrade: the pinned UnitMatchPy 3.2.6/3.2.7
        # line declares numpy>=2 and so coexists with the v2 baseline.
        # The resolver assertion below is what catches a future
        # numpy<2 re-pin (as 3.2.8+ introduced).
        conda create -y -n spyglass_v2_matching python=3.11
        # Install tolerates failure: upstream resolver breakages are
        # often transient (network, build-wheel) and NOT what this
        # gate measures. The resolver-evidence signal comes from the
        # pytest run below. With SPIKESORTING_V2_MATCHING_EXTRA_REQUIRED=1
        # the test fails (not skips) when the post-install deps are
        # absent, so a permanent extra-declaration bug cannot pose as
        # a transient install hiccup. The pytest run itself must NOT
        # be masked by ``|| true``.
        conda run -n spyglass_v2_matching pip install \
          -e ".[test,spikesorting-v2,spikesorting-v2-matching]" || true
        # This env is the only one with UnitMatchPy installed, so it owns the
        # cross-session matcher gates: the resolver-evidence assertion plus the
        # polymer ground-truth AUC gate (and the rest of the matcher suite).
        # The AUC gate reaches the run-tests job's MySQL service via --no-docker.
        # It SKIPS until the two-session polymer fixtures are present; to ENFORCE
        # it in CI, upload mearec_polymer_128ch_2sessions_{s1,s2}.nwb, set their
        # URLs in tests/spikesorting/v2/fixtures/_fetch.py, fetch them here, and
        # add them to SPYGLASS_V2_REQUIRE_FIXTURES so an absent fixture fails the
        # run rather than silently skipping.
        if [ "${{ github.event_name }}" = "schedule" ] || \
           [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          python tests/spikesorting/v2/fixtures/_fetch.py \
            mearec_polymer_128ch_2sessions_s1 \
            mearec_polymer_128ch_2sessions_s2 || true
        fi
        # This env is the only one with UnitMatchPy installed, so it also owns
        # the cross-session NOTEBOOK end-to-end test: notebook 14's Part B match
        # needs UnitMatchPy (bundle extraction), so the default v2 job (no
        # matching extra) runs only its concat half. Fetch the smoke fixture it
        # drives off (no ``|| true``: an absent smoke fixture must fail the step,
        # not silently skip the match path).
        conda run -n spyglass_v2_matching python \
          tests/spikesorting/v2/fixtures/_fetch.py mearec_polymer_smoke
        conda run -n spyglass_v2_matching pytest \
          tests/spikesorting/v2/test_v1_parity.py::test_optional_matching_extra_resolution \
          tests/spikesorting/v2/test_unitmatch.py \
          tests/spikesorting/v2/test_unitmatch_backend.py \
          tests/spikesorting/v2/test_notebook_execution.py::test_cross_session_notebook_runs \
          --no-docker --no-dlc -q
    # --- FigPack curation extra lane (separate env). The curation extra
    # (figpack + figpack-spike-sorting) is kept out of the default v2 env, so
    # the FigPack table layer AND the orchestrator figpack=True path otherwise
    # run in NO CI environment. A separate env mirrors the matching lane above:
    # the figpack pins are light, but isolating them keeps the default env's
    # SpikeInterface pin uncoupled from the figpack-verified SI combo. These
    # tests build a real v2 analyzer, so they reach the run-tests MySQL service
    # via --no-docker and need the smoke fixture, like the matcher lane.
    - name: FigPack curation tests (separate env)
      run: |
        conda create -y -n spyglass_v2_curation python=3.11
        # NO ``|| true``: a failed curation install must fail the step. The
        # figpack tests below gate on a figpack import, so a silent install
        # failure would leave them skipping while CI stayed green -- exactly the
        # gap this lane closes.
        conda run -n spyglass_v2_curation pip install \
          -e ".[test,spikesorting-v2,spikesorting-v2-curation]"
        conda run -n spyglass_v2_curation python \
          tests/spikesorting/v2/fixtures/_fetch.py mearec_polymer_smoke
        conda run -n spyglass_v2_curation pytest \
          tests/spikesorting/v2/test_figpack_curation_integration.py \
          "tests/spikesorting/v2/single_session/test_pipeline_run.py::test_run_v2_pipeline_figpack_publishes_offline_view" \
          "tests/spikesorting/v2/single_session/test_pipeline_run.py::test_run_v2_pipeline_figpack_zero_units_skips_view" \
          tests/spikesorting/v2/test_notebook_execution.py::test_curation_notebook_runs \
          --no-docker --no-dlc -q

  pytest-legacy:
    # Legacy (v0/v1) spike-sorting tests run under SpikeInterface 0.99,
    # isolated from the 0.104 pin the rest of the suite uses. The v0/v1
    # active populate / curation / recompute paths are gated behind
    # ``_require_legacy_si_environment`` (raises under SI >= 0.101), so
    # they CANNOT run in the `run-tests` job (which installs the 0.104
    # pin and ``--ignore``s tests/spikesorting/v0 and v1). This job runs
    # them against the legacy SpikeInterface line instead, so the v0/v1
    # runtime keeps CI coverage while it is deprecated in favor of v2.
    name: pytest-legacy (SpikeInterface 0.99)
    # Skip if PR is closed but not merged
    if: |-
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    services:
      mysql:
        image: datajoint/mysql:8.0
        env:
          MYSQL_DATABASE: localhost
          MYSQL_ROOT_PASSWORD: tutorial
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        # mysql client for DataJoint; ffmpeg/libsm6/libxext6 for the
        # video fixtures the minirec ingestion (mini_insert) pulls in.
        sudo apt-get install -y \
          mysql-client libmysqlclient-dev ffmpeg libsm6 libxext6
    - name: Pin SpikeInterface to the legacy 0.99 line (coherent resolve)
      # The repo's main dependencies pin spikeinterface==0.104.3 (+ a matching
      # probeinterface>=0.3.2) for the v2 pipeline; the v0/v1 active runtime
      # paths need the 0.99 line instead. Relax those two pins in the EPHEMERAL
      # checkout so the env build below resolves a COHERENT SI-0.99 stack in
      # one pass -- matching master's run-tests env (which pins 0.99.1 natively
      # and lands on numpy 1.26 because pytorch<1.12 caps numpy<2). Installing
      # the 0.104 stack and downgrading afterward instead left a numpy-2 /
      # neo-0.14 set the SI-0.99 line cannot use, which surfaced in turn as the
      # np.issctype, probeinterface-0.3.x contact-check, and recompute
      # namespace-mismatch failures. This never touches the committed pin.
      run: |
        sed -i \
          -e 's/"spikeinterface==0.104.3"/"spikeinterface>=0.99.1,<0.100"/' \
          -e 's/"probeinterface>=0.3.2"/"probeinterface>=0.2.19,<0.3"/' \
          -e 's/^  "numpy>=2,<3",/  "numpy>=1.23,<2",/' \
          pyproject.toml
        grep -nE '"(spikeinterface|probeinterface|numpy)' pyproject.toml
    - name: Set up conda (legacy SpikeInterface 0.99 environment)
      # Conda-managed via the dedicated env file. With the pins relaxed above,
      # the env file's ``.[test]`` install resolves SpikeInterface 0.99.1 + a
      # compatible probeinterface / neo / numpy / pynwb / hdmf set in a single
      # pass -- no post-hoc downgrade needed.
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: spyglass_spikesorting_legacy
        environment-file: environments/environment_spikesorting_legacy.yml
        miniforge-version: latest
        use-mamba: true
    - name: Verify the legacy SI-0.99 stack resolved coherently
      # No install -- the relaxed-pin env build above already resolved the
      # SI-0.99 stack. Assert the result so a future resolver change that
      # silently drifts back to the 0.104 line (or numpy 2) fails loudly here
      # rather than deep inside a test. SI must be < 0.100 (NOT <0.101): 0.100.x
      # changed NwbRecordingExtractor timestamp handling ("'Group' object has
      # no attribute 'timestamps'"). numpy < 2 (np.issctype) and probeinterface
      # < 0.3 (strict contact-position check) follow from the coherent resolve.
      run: |
        python - <<'PY'
        from packaging.version import Version
        import spikeinterface as si
        import probeinterface as pi
        import numpy as np
        print("SI", si.__version__, "| probeinterface", pi.__version__,
              "| numpy", np.__version__)
        assert Version(si.__version__) < Version("0.100"), si.__version__
        assert Version(pi.__version__) < Version("0.3"), pi.__version__
        assert Version(np.__version__) < Version("2"), np.__version__
        PY
    - name: Cache test data
      id: cache-test-data
      uses: actions/cache@v4
      with:
        # Shares the cache key with the run-tests job so the minirec NWB
        # + video fixtures are downloaded at most once across both jobs.
        path: |
          tests/_data/raw/
          tests/_data/video/
        key: |-
          test-data-${{ hashFiles('.github/workflows/test-conda.yml') }}-v1
        restore-keys: |
          test-data-
    - name: Download data
      if: steps.cache-test-data.outputs.cache-hit != 'true'
      env:
        BASEURL: https://ucsf.box.com/shared/static/
        NWB_URL: k3sgql6z475oia848q1rgms4zdh4rkjn.nwb
        VID1URL: ykep8ek4ogad20wz4p0vuyuqfo60cv3w.h264
        VID2URL: d2jjk0y565ru75xqojio3hymmehzr5he.h264
        NWBFILE: minirec20230622.nwb
        VID_ONE: 20230622_minirec_01_s1.1.h264
        VID_TWO: 20230622_minirec_02_s2.1.h264
        RAW_DIR: /home/runner/work/spyglass/spyglass/tests/_data/raw/
        VID_DIR: /home/runner/work/spyglass/spyglass/tests/_data/video/
      run: |
        mkdir -p $RAW_DIR $VID_DIR
        curl_opts() { # Declare func with download options
          curl -L --output "$1""$2" "$BASEURL""$3"
        }
        curl_opts $RAW_DIR $NWBFILE $NWB_URL
        curl_opts $VID_DIR $VID_ONE $VID1URL
        curl_opts $VID_DIR $VID_TWO $VID2URL
    - name: Move actions coveragerc
      run: mv tests/.coveragerc .coveragerc
    - name: Run legacy spike-sorting tests
      run: |
        # --base-dir pins tests to the cached tests/_data/ path (see the
        # run-tests job for the rationale). --no-docker uses the conftest
        # null_server path against the MySQL service above.
        # The v2 clusterless waveform-feature file also carries the
        # legacy-environment guard test, which must run under SI 0.99 (its v2
        # cases skip via the SI-version marker). Collected as a single explicit
        # path (not the whole v2 dir) and with lazy v2-infra imports, so this
        # does not pull the SI-0.104 test modules under the legacy env.
        pytest tests/spikesorting/v0 tests/spikesorting/v1 \
          tests/spikesorting/v2/test_clusterless_waveform_features.py \
          --no-docker --no-dlc --base-dir ./tests/_data/ -q
